name: CI

env:
  DATABASE_URL: postgres://nexpress:nexpress@localhost:5433/nexpress_hosted_demo_ci
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NP_SECRET: ci-only-secret-ci-only-secret-ci-only-secret
  SITE_URL: http://localhost:3000

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
